name: Run Remote Shell Script Manually

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  run-remote-script:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 安装必要工具
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl tar

    # 3. 下载并运行远程脚本
    - name: Download and run install.sh
      run: |
        curl -s -O https://raw.githubusercontent.com/morytyann/OpenWrt-mihomo/refs/heads/main/install.sh
        chmod +x ./install.sh  # 添加可执行权限
        ./install.sh

    # 4. 将解压的文件放入 abc 文件夹
    - name: Move extracted files to abc directory
      run: |
        mkdir -p ./abc  # 确保目标目录存在
        mv ./mihomo_* ./abc/  # 假设解压后的文件前缀为 mihomo_

    # 5. 提交并推送更改
    - name: Commit and push changes
      run: |
        git config --local user.name "GitHub Actions Bot"
        git config --local user.email "actions@github.com"
        git add ./abc
        git commit -m "Add MihomoTProxy files to abc directory" || echo "No changes to commit"
        git push
