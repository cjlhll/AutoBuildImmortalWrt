name: Download and Extract mihomo tarball

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  download-and-extract:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 安装必要工具
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl tar

    # 3. 获取架构和版本信息
    - name: Get architecture and branch
      run: |
        arch="x86_64"  # 这里手动指定架构，如果需要动态获取，可以调整脚本
        branch="openwrt-23.05"  # 同样，手动指定版本，如果需要动态获取，也可以调整
        echo "arch=$arch" >> $GITHUB_ENV
        echo "branch=$branch" >> $GITHUB_ENV

    # 4. 下载 tarball 文件
    - name: Download tarball
      run: |
        echo "download tarball"
        tarball="mihomo_${{ env.arch }}-${{ env.branch }}.tar.gz"
        curl -s -L -o "$tarball" "https://github.com/morytyann/OpenWrt-mihomo/releases/latest/download/$tarball"

    # 5. 解压 tarball 文件
    - name: Extract tarball
      run: |
        echo "extract tarball"
        tar -x -z -f "$tarball"
        rm -f "$tarball"

    # 6. 创建 abc 文件夹并移动文件
    - name: Move extracted files to abc folder
      run: |
        mkdir -p ./abc
        mv mihomo_* ./abc/

    # 7. 提交并推送更改（如果有）
    - name: Commit and push changes
      run: |
        git config --local user.name "GitHub Actions Bot"
        git config --local user.email "actions@github.com"
        git add ./abc
        git commit -m "Add extracted files to abc directory" || echo "No changes to commit"
        git push
